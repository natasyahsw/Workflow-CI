# GitHub Actions CI/CD Workflow - ML System
# ============================================
# Kriteria 3 - Skilled/Advanced
#
# Tahapan:
#   1. Checkout repository
#   2. Set up Python 3.12.7
#   3. Check Environment
#   4. Install dependencies
#   5. Run MLflow Project (mlflow run)
#   6. Get latest MLflow run_id
#   7. Upload to GitHub (artifacts)

name: ML CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12.7"

jobs:
  ml-pipeline:
    runs-on: ubuntu-latest

    steps:
      # ============================
      # 1. Checkout repository
      # ============================
      - name: Checkout repository
        uses: actions/checkout@v4

      # ============================
      # 2. Setup Python
      # ============================
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ============================
      # 3. Check Environment
      # ============================
      - name: Check Env
        run: |
          echo "Python version:"
          python --version
          echo "Pip version:"
          pip --version
          echo "Working directory:"
          pwd
          echo "Files in repository:"
          ls -la
          echo "MLProject folder:"
          ls -la MLProject/

      # ============================
      # 4. Install Dependencies
      # ============================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn mlflow==2.19.0 matplotlib seaborn joblib psutil

      # ============================
      # 5. Run MLflow Project
      # ============================
      - name: Run MLflow Project
        run: |
          echo "Running ML training via MLflow Project..."
          mlflow run MLProject --env-manager=local

      # ============================
      # 6. Get latest MLflow run_id
      # ============================
      - name: Get latest MLflow run_id
        run: |
          cd MLProject
          RUN_ID=$(python -c "
          import mlflow
          client = mlflow.MlflowClient()
          experiment = client.get_experiment_by_name('Credit Scoring')
          if experiment:
              runs = client.search_runs(experiment.experiment_id, max_results=1)
              if runs:
                  print(runs[0].info.run_id)
              else:
                  print('no-runs')
          else:
              print('no-experiment')
          ")
          echo "Latest Run ID: $RUN_ID"
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

      # ============================
      # 7. Upload Artifacts to GitHub
      # ============================
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ml-model-artifacts
          path: |
            MLProject/mlruns/
            MLProject/credit_risk_preprocessing/
            MLProject/model.pkl
          retention-days: 30
